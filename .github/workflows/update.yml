name: Update EPG

on:

  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install -r requirements.txt

      - name: Build
        run: |
          python scripts/build.py
          python scripts/generate_ptn_epg.py
          
      - name: Publish Files
        run: |
          mkdir -p docs
          cp output/* docs/

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add docs

          git commit -m "Update EPG" || exit 0

          git push
