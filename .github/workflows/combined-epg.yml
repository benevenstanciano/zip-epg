name: Daily Combined EPG

on:
  schedule:
    - cron: "0 5 * * *"     # Runs once daily at 5:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  combine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Combined 36-Hour EPG
        run: python scripts/combine_epg.py

      - name: Publish & Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/epg-combined.xml
          git commit -m "Update combined EPG - $(date -u +'%Y-%m-%d')" || exit 0
          git push
